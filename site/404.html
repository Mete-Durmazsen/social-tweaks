<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sayfa bulunamadı — Social Tweaks</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#07070b" />
    <link rel="icon" href="./assets/logo.png" type="image/png" />
    <style>
      :root {
        --bg: #07070b;
        --fg: #f5f5f8;
        --muted: #a0a0b0;
        --brand-from: #3aa8e0;
        --brand-to: #6a4fe8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(680px 420px at 20% -8%, rgba(58, 168, 224, 0.16), transparent 60%),
          radial-gradient(720px 480px at 85% 4%, rgba(106, 79, 232, 0.18), transparent 62%);
      }
      img { width: 56px; height: 56px; border-radius: 14px; margin-bottom: 24px; }
      h1 {
        font-size: clamp(64px, 12vw, 110px);
        font-weight: 900;
        letter-spacing: -0.04em;
        margin: 0;
        background: linear-gradient(120deg, var(--brand-from), var(--brand-to));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p { color: var(--muted); font-size: 18px; margin: 8px 0 28px; }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 24px;
        border-radius: 13px;
        font-weight: 600;
        color: #fff;
        text-decoration: none;
        background: linear-gradient(120deg, var(--brand-from), var(--brand-to));
        box-shadow: 0 10px 30px rgba(106, 79, 232, 0.4);
      }
    </style>
  </head>
  <body>
    <div>
      <img src="./assets/logo.png" alt="Social Tweaks" />
      <h1>404</h1>
      <p>Aradığın sayfa burada yok.</p>
      <a href="/">Ana sayfaya dön</a>
    </div>
  </body>
</html>
