<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Tweaks</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header>
      <img src="../icons/icon48.png" alt="" class="logo" />
      <h1>Social Tweaks</h1>
    </header>

    <main>
      <section class="card">
        <div class="card-title">
          <span class="platform-icon platform-youtube" aria-hidden="true">
            <svg viewBox="0 0 28 20">
              <rect width="28" height="20" rx="6" fill="#ff0000" />
              <path d="M11.5 6.2v7.6l6.5-3.8z" fill="#fff" />
            </svg>
          </span>
          YouTube
        </div>

        <label class="row switch-row" for="enabled">
          <span data-i18n="ytAutoAdvance">Shorts'ta otomatik geçiş</span>
          <span class="switch">
            <input type="checkbox" id="enabled" />
            <span class="slider"></span>
          </span>
        </label>

        <label class="row switch-row" for="showDislikes">
          <span data-i18n="showDislikes">Dislike sayısını göster</span>
          <span class="switch">
            <input type="checkbox" id="showDislikes" />
            <span class="slider"></span>
          </span>
        </label>

        <label class="row switch-row" for="youtubePopoutButtonEnabled">
          <span data-i18n="youtubePopoutButton">Video pop-out butonu</span>
          <span class="switch">
            <input type="checkbox" id="youtubePopoutButtonEnabled" />
            <span class="slider"></span>
          </span>
        </label>
      </section>

      <section class="card">
        <div class="card-title">
          <span class="platform-icon platform-instagram" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="5" />
              <circle cx="12" cy="12" r="4" />
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
            </svg>
          </span>
          Instagram
        </div>

        <label class="row switch-row" for="instagramEnabled">
          <span data-i18n="igAutoAdvance">Reels'te otomatik geçiş</span>
          <span class="switch">
            <input type="checkbox" id="instagramEnabled" />
            <span class="slider"></span>
          </span>
        </label>
      </section>
    </main>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
